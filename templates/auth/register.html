{% extends "base.html" %}
{% block title %}Register — APNI PEHCHAN{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-card">
        <div class="auth-brand">AP</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-sub">Start building your professional identity today</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Jamshaid Nawaz" required autocomplete="name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn-primary full">Create Account →</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
