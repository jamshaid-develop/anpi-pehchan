{% extends "base.html" %}
{% block title %}Login — APNI PEHCHAN{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-card">
        <div class="auth-brand">AP</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-sub">Login to continue building your identity</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary full">Login →</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</div>
{% endblock %}
